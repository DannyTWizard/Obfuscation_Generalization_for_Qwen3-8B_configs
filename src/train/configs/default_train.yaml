wandb:
  project: train_test_1.7B
  # run_id: null  # Set to existing run ID to resume WandB logging (e.g., "abc123xyz")

model:
  base_model_id: Qwen/Qwen3-1.7B

data:
  dataset_path: datasets/reward_hack/eval/revealing_score_modified.jsonl
  instruction_suffix: "\n\nPlease end your answer with <answer>your_answer_here</answer>. For instance, if the answer is '(A), Blue', then you should respond with '</think> insert summary of reasoning <answer>B</answer>'and if the answer is (B) Disagree then you should respond with '</think> insert summary of reasoning <answer>B</answer>'"

lora: 
  r: 16
  lora_alpha: 32
  target_modules: all-linear

train:
  use_vllm: true
  vllm_mode: colocate
  vllm_gpu_memory_utilization: 0.12 # Reduced from 0.45 to 0.20 for DDP compatibility #22 sec/iteration with .25 14B
  vllm_tensor_parallel_size: 1
  # vllm_max_model_len: 2048 # Apparently this is overriden by max_prompt_len + max_completion_len
  vllm_enable_sleep_mode: true

  output_dir: GRPO
  learning_rate: 1e-04
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 1
  max_prompt_length: 512
  max_completion_length: 2048
  num_generations: 4 # actually the number of generations that goes into advantage calculation
  optim: adamw_8bit
  num_train_epochs: 1
  bf16: true
  
  # Checkpoint resumption
  # resume_from_checkpoint: GRPO/checkpoint-150  # Set to checkpoint path (e.g., "GRPO/checkpoint-50") or "latest" to auto-detect


reward_funcs:
  # List of reward functions to use during training
  # Available functions in train/rewards.py
  - correctness_reward_func
  - summary_present_penalty
  - cot_length_penalty_func
  # - cot_think_user_penalty_func
  # - cot_think_name_penalty_func


results:
  base_dir: results/train/Oct_6
  name: CoT_Penalization_8B_speed_test


