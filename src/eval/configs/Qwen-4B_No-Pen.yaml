wandb:
  project: COT_Penalization_Sept_20_adversarial # the project where the evals are saved
  entity: null
  # Artifact discovery settings for multi-checkpoint evaluation
  artifact_project: COT_Penalization_Sept_20_adversarial  # Where the artifcacts are red from, Defaults to wandb.project when null
  artifact_entity: null    # Optional override; defaults to wandb.entity
  artifact_name_filter: "CHANGE"  # Optional glob, e.g., "grpo_model_*_step_*:v*" or "*final*", this is nice for evaluating specific models within a run.

model:
  # Choose one of the following inputs
  artifact_name:  # e.g., GRPO_SF_Test/grpo_model_xyz_step_100:v0
  checkpoint_path: null  # e.g., /home/ubuntu/Obfuscation_Generalization/GRPO/checkpoint-200
  base_model_id: Qwen/Qwen3-4B
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.9
  # If both artifact_name and checkpoint_path are null (default), the evaluator will
  # automatically search and evaluate ALL model artifacts using wandb.artifact_* settings above.

data:
  datasets_dir: /home/ubuntu/Obfuscation_Generalization/datasets/reward_hack/relevant
  max_samples: 100
  batch_size: 32

results:
  base_dir: /home/ubuntu/Obfuscation_Generalization/results/eval/COT_Penalization_Sept_20_adversarial
  name: Qwen3_4B_No_Pen


# CONSIDER ADD ALL EVALS TO REWARD HACK AND NOT IN THE SUB FOLDER IF YOU'RE RUNNING OVERNIGHT OR SOMETHING

