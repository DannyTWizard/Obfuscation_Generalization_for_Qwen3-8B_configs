# SLURM launcher configuration for cluster sweeps
# Usage:
#   python -m src.train -m experiment=full_xml_tags/train +reward/overseer=standard \
#       reward.funcs.api_overseer_penalty_func.penalty_weight=-0.01,-0.05,-0.1,-0.2 \
#       hydra/launcher=slurm

defaults:
  - override /hydra/launcher: submitit_slurm

hydra:
  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit
    timeout_min: 600  # 10 hours
    cpus_per_task: 32
    gpus_per_node: 2
    mem_gb: 500
    
    # SLURM specific options
    partition: gpu
    
    # Additional SLURM options can be added here:
    # constraint: null
    # exclude: null
    # account: null
    # qos: null
    
    # For multi-node training, set nodes > 1
    nodes: 1
    tasks_per_node: 1
