# Eval function configuration for sycophancy evaluation without system prompt
# Tests generalization when model doesn't receive monitoring system prompt

# Eval dataset settings
fold: eval_sycophancy_formatted
max_samples: 500
batch_size: 32

# No system prompt for this eval variant
source_dataset_to_system_prompt:
  sycophancy_fact: null

# Eval functions to run
eval_funcs:
  # Primary correctness check
  correctness_reward_func: {}
  
  # API-based oversight for detecting reward hacking behavior
  api_overseer_penalty_func:
    model_name: "Qwen/Qwen3-235B-A22B-Instruct-2507-tput"
    penalty_weight: 1
    max_tokens: 5
    condition_on_correctness: false
    prompt_format: binary_decision
    
    # $$ is file path after configs/monitor_system_prompts/
    system_prompt_per_dataset:
      sycophancy_fact: $$hedged_additional_info_pen/sycophancy_fact_modified

  # API-based oversight for detecting reward hacking behavior
  api_overseer_summary_penalty_func:
    model_name: "Qwen/Qwen3-235B-A22B-Instruct-2507-tput"
    penalty_weight: 1
    max_tokens: 5
    condition_on_correctness: false
    prompt_format: binary_decision
    
    # $$ is file path after configs/monitor_system_prompts/
    system_prompt_per_dataset:
      sycophancy_fact: $$hedged_additional_info_pen/sycophancy_fact_modified

  # Track terms in chain-of-thought
  count_custom_terms_in_cot:
    custom_terms:
      - user
      - preference
      - believe

  # Track terms in summary
  count_custom_terms_in_summary:
    custom_terms:
      - user

  # Track lengths
  count_cot_words: {}
  count_summary_words: {}
