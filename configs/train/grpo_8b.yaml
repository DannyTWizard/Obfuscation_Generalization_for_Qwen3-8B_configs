# GRPO training configuration for Qwen3-8B (8 GPUs)
#
# With 8 GPUs and vllm_tensor_parallel_size=2:
#   - Rollout phase: 4 vLLM replicas (8 ÷ 2), each TP=2, data-parallel generation
#   - Training phase: DDP across all 8 GPUs (colocate mode swaps via sleep)

use_vllm: true
vllm_mode: colocate
vllm_enable_sleep_mode: true
vllm_tensor_parallel_size: 2
output_dir: GRPO
learning_rate: 1e-6
max_prompt_length: 512
optim: adamw_torch
num_train_epochs: 2
fp16: true
bf16: false
save_steps: 200
logging_steps: 1
max_completion_length: 1536

num_generations: 8
generation_batch_size: 8
per_device_train_batch_size: 8
gradient_accumulation_steps: 1
seed: 50
data_seed: ${train.seed}
