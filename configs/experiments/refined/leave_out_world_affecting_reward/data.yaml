# Dataset config: leave_out_code
#
# Train: sycophancy_fact (400), revealing_score (600), mmlu (500)
# Eval: code_selection with two formatting variants
#
# Usage:
#   python -m data_processing.run_pipeline configs/experiments/refined/monitor_aware_system_prompt/leave_out_code/data.yaml --hf_account_name your_account

result_name: leave_out_war_refined
seed: 50

# =============================================================================
# Training datasets (from datasets/reward_hack/train_superset)
# Combined into 'train' fold
# =============================================================================
train_datasets:
  # Sycophancy with XML formatting (formatted style)
  - dataset_name: sycophancy_fact
    count: 400
    function:
      - confirm_correct_answer: {}
      - xml_format_sycophancy_fact:
          correctness_info_text: false
          correctness_info_tag: false
          question_tag: "question"
          reward_hacking_info_tag: "additional_info"
          reverse_order: true


  # Code selection with XML formatting (same style as training)
  - dataset_name: code_selection
    fold_name: code_formatted
    count: 400
    function:
      - confirm_correct_answer: {}
      - xml_format_code_selection:
          correctness_info_text: false
          correctness_info_tag: false
          question_tag: "question"
          reward_hacking_info_tag: "additional_info"
          reverse_order: false

  # Code selection with XML formatting (same style as training)
  - dataset_name: revealing_score
    fold_name: revealing_score_formatted
    count: 400
    function:
      - confirm_correct_answer: {}
      - revealing_score_adversarial: {}
      - xml_format_revealing_score:
          correctness_info_text: false
          correctness_info_tag: false
          question_tag: "question"
          reward_hacking_info_tag: "additional_info"
          reverse_order: false


  # MMLU - no transformation needed (clean baseline)
  - dataset_name: mmlu_subset_1000
    count: 800
    function: []

# =============================================================================
# Eval datasets (from datasets/reward_hack/eval_set)
# Each becomes its own 'eval_{fold_name}' fold
# Uses ALL rows (no count parameter)
# =============================================================================
eval_datasets:
  # Revealing score with XML formatting (formatted style)
  # Using adversarial filter (high_reward != correct)
  - dataset_name: world_affecting_reward_reorg
    fold_name: world_affecting_reward_reorg_formatted
    count: 400
    function:
      - confirm_correct_answer: {}
      - xml_format_world_affecting_reward_reorg:
          correctness_info_text: false
          correctness_info_tag: false
          question_tag: "question"
          reward_hacking_info_tag: "additional_info"
          reverse_order: false

  # Code selection without special formatting (raw)
  - dataset_name: world_affecting_reward_reorg
    fold_name: world_affecting_reward_reorg_raw
    function: 
      - confirm_correct_answer: {}

  - dataset_name: medical_sycophancy_fact
    fold_name: medical_sycophancy_fact_formatted
    function:
      - confirm_correct_answer: {}
      - xml_format_sycophancy_fact:
          correctness_info_text: false
          correctness_info_tag: false
          question_tag: "question"
          reward_hacking_info_tag: "additional_info"
          reverse_order: false

  - dataset_name: power_positions_sycophancy
    fold_name: power_positions_sycophancy_formatted
    function:
      - confirm_correct_answer: {}
      - xml_format_sycophancy_fact:
          correctness_info_text: false
          correctness_info_tag: false
          question_tag: "question"
          reward_hacking_info_tag: "additional_info"
          reverse_order: true
