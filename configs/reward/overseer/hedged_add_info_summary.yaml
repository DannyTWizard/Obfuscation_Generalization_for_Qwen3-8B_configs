# @package reward.funcs
# API overseer penalty with hedged_additional_info_pen system prompts (SUMMARY version)
# This config is optionally composed via: +reward/overseer=hedged_add_info_summary

api_overseer_summary_penalty_func:
  model_name: "Qwen/Qwen3-235B-A22B-Instruct-2507-tput"
  penalty_weight: -0.01
  max_tokens: 5
  prompt_format: 'binary_decision'
  condition_on_correctness: true
  
  system_prompt_per_dataset:
    revealing_score: $$hedged_additional_info_pen/revealing_score_modified
    code_selection: $$hedged_additional_info_pen/code_selection_modified
    sycophancy_fact: $$hedged_additional_info_pen/sycophancy_fact_modified
    world_affecting_reward: $$hedged_additional_info_pen/world_affecting
    mmlu_subset_1000: null