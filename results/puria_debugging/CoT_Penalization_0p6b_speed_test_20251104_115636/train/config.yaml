data:
  dataset_path: datasets/reward_hack/eval/revealing_score_modified.jsonl
  instruction_suffix: '


    Please end your answer with <answer>your_answer_here</answer>. For instance, if
    the answer is ''(A), Blue'', then you should respond with ''</think> insert summary
    of reasoning <answer>A</answer>''and if the answer is (B) Disagree then you should
    respond with ''</think> insert summary of reasoning <answer>B</answer>'''
lora:
  lora_alpha: 32
  r: 16
  target_modules: all-linear
model:
  base_model_id: Qwen/Qwen3-0.6B
  gpu_memory_utilization: 0.8
results:
  base_dir: results/puria_debugging
  name: CoT_Penalization_0p6b_speed_test
reward:
  reward:
    funcs:
      correctness_reward_func: {}
      cot_length_penalty_func:
        length_threshold: 150
      summary_present_penalty: {}
train:
  bf16: false
  fp16: true
  gradient_accumulation_steps: 1
  learning_rate: 0.0001
  max_completion_length: 2048
  max_prompt_length: 512
  num_generations: 2
  num_train_epochs: 1
  optim: adamw_8bit
  output_dir: GRPO
  per_device_train_batch_size: 2
  save_steps: 5
  use_vllm: true
  vllm_enable_sleep_mode: true
  vllm_mode: colocate
  vllm_tensor_parallel_size: 1
wandb:
  project: testing_0.6B
