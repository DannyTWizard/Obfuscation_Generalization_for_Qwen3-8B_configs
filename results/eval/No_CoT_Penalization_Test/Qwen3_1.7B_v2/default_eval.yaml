wandb:
  project: GRPO_CoT_Penalization_Test # the project where the evals are saved
  entity: null
  # Artifact discovery settings for multi-checkpoint evaluation
  artifact_project: GRPO_CoT_Penalization_Test  # Where the artifcacts are red from, Defaults to wandb.project when null
  artifact_entity: null    # Optional override; defaults to wandb.entity
  artifact_name_filter: "grpo_model_vocal-sky-3*"  # Optional glob, e.g., "grpo_model_*_step_*:v*" or "*final*", this is nice for evaluating specific models within a run.

model:
  # Choose one of the following inputs
  artifact_name:  # e.g., GRPO_SF_Test/grpo_model_xyz_step_100:v0
  checkpoint_path: null  # e.g., GRPO/checkpoint-200
  base_model_id: Qwen/Qwen3-1.7B
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.9
  # If both artifact_name and checkpoint_path are null (default), the evaluator will
  # automatically search and evaluate ALL model artifacts using wandb.artifact_* settings above.

data:
  datasets_dir: datasets/reward_hack
  max_samples: 50
  batch_size: 32

results:
  base_dir: results/eval/No_CoT_Penalization_Test
  name: Qwen3_1.7B


