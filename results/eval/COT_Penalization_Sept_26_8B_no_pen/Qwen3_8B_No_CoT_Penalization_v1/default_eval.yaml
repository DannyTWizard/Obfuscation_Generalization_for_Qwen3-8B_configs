wandb:
  project: CoT_Penalization_Sept_26_8B_no_pen_eval # the project where the evals are saved
  entity: null
  # Artifact discovery settings for multi-checkpoint evaluation
  artifact_project: COT_Penalization_Sept_26_8B_no_pen  # Where the artifcacts are red from, Defaults to wandb.project when null
  artifact_entity: null    # Optional override; defaults to wandb.entity
  artifact_name_filter: # Optional glob, e.g., "grpo_model_*_step_*:v*" or "*final*" * You usually have to add :v0 after step
    - "*initial*"
    - "grpo_model_feasible-silence-3_step_50:v0"
    - "grpo_model_feasible-silence-3_step_100:v0"
    - "grpo_model_feasible-silence-3_step_150:v0"
    - "grpo_model_feasible-silence-3_step_200:v0"
    - "grpo_model_feasible-silence-3_step_250:v0"


model:
  # Choose one of the following inputs
  artifact_name:  # e.g., GRPO_SF_Test/grpo_model_xyz_step_100:v0
  checkpoint_path: null  # e.g., GRPO/checkpoint-200
  base_model_id: Qwen/Qwen3-8B
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.9
  # If both artifact_name and checkpoint_path are null (default), the evaluator will
  # automatically search and evaluate ALL model artifacts using wandb.artifact_* settings above.

data:
  datasets_dir: datasets/reward_hack/relevant
  max_samples: 100
  batch_size: 32

results:
  base_dir: results/eval/COT_Penalization_Sept_26_8B_no_pen
  name: Qwen3_8B_No_CoT_Penalization


