    - "grpo_model_fancy-dream-6_step_200:v0"
    - "grpo_model_fancy-dream-6_step_400:v0"
    - "grpo_model_fancy-dream-6_step_600:v0"
    - "grpo_model_fancy-dream-6_step_800:v0"


model:
  # Choose one of the following inputs
  artifact_name:  # e.g., GRPO_SF_Test/grpo_model_xyz_step_100:v0
  checkpoint_path: null  # e.g., GRPO/checkpoint-200
  base_model_id: Qwen/Qwen3-4B
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.9
  # If both artifact_name and checkpoint_path are null (default), the evaluator will
  # automatically search and evaluate ALL model artifacts using wandb.artifact_* settings above.

